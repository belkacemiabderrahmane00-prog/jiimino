<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 130" aria-label="Ville de Vénissieux">
  <!-- small olive green square -->
  <rect x="82" y="6" width="11" height="11" fill="#8a9c1a"/>
  <!-- "ville de" -->
  <text x="100" y="18" font-family="'Arial', 'Helvetica', sans-serif" font-size="15" font-weight="400" fill="#222222" letter-spacing="0.5">ville de</text>
  <!-- "venissieux" bold -->
  <text x="2" y="98" font-family="'Arial Black', 'Arial', sans-serif" font-size="78" font-weight="900" fill="#1a1a1a" letter-spacing="-1">venissieux</text>
  <!-- Red chevron bottom-left -->
  <polygon points="4,118 18,103 26,111 12,126" fill="#cc2200"/>
  <!-- Orange square bottom-right -->
  <rect x="206" y="109" width="14" height="14" fill="#e06010"/>
</svg>
