<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 185" aria-label="Ville de Vénissieux">
  <!-- Olive green square before "ville de" -->
  <rect x="88" y="28" width="13" height="13" fill="#8a9c1a"/>
  <!-- "ville de" — thin weight -->
  <text x="108" y="42" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="20" font-weight="400" fill="#1a1a1a" letter-spacing="0.5">ville de</text>
  <!-- "venissieux" — ultra bold -->
  <text x="4" y="148" font-family="'Arial Black', 'Helvetica Neue', 'Arial', sans-serif" font-size="106" font-weight="900" fill="#1a1a1a" letter-spacing="-2">venissieux</text>
  <!-- Red italic slash — bottom left under "v" -->
  <polygon points="8,178 24,153 33,161 17,186" fill="#cc1a00"/>
  <!-- Orange square — bottom right under "s" -->
  <rect x="308" y="162" width="17" height="17" fill="#e05500"/>
</svg>
